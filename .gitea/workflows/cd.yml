name: FunPot Core CD

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
  REGISTRY_REPOSITORY: ${{ secrets.REGISTRY_REPOSITORY }}

defaults:
  run:
    shell: bash
    
jobs:
  publish-and-deploy:
    name: Deploy to ${{ matrix.environment }}
    runs-on: ubuntu-latest
    container:
      image: docker.gitea.com/runner-images:ubuntu-latest
    environment: ${{ matrix.environment }}
    strategy:
      matrix:
        include:
          - environment: development
            branch: dev
            webhook_secret: DEV_DEPLOY_WEBHOOK_URL
            healthcheck_secret: DEV_DEPLOY_HEALTHCHECK_URL
            database_url_secret: DEV_DATABASE_URL
            migration_mode_secret: DEV_MIGRATIONS_MODE
            healthcheck_timeout: 240
            healthcheck_interval: 5
          - environment: production
            branch: main
            webhook_secret: PROD_DEPLOY_WEBHOOK_URL
            healthcheck_secret: PROD_DEPLOY_HEALTHCHECK_URL
            database_url_secret: PROD_DATABASE_URL
            migration_mode_secret: PROD_MIGRATIONS_MODE
            healthcheck_timeout: 420
            healthcheck_interval: 10
    if: ${{ github.ref_name == matrix.branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Verify registry configuration
        run: |
          set -euo pipefail
          if [ -z "${REGISTRY_URL:-}" ] || [ -z "${REGISTRY_REPOSITORY:-}" ]; then
            echo "Registry URL or repository secret is missing." >&2
            exit 1
          fi

      - name: Log in to registry
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${REGISTRY_USERNAME:-}" ] || [ -z "${REGISTRY_PASSWORD:-}" ]; then
            echo "Registry credentials are not configured." >&2
            exit 1
          fi
          echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_URL" --username "$REGISTRY_USERNAME" --password-stdin

      - name: Resolve image reference
        id: image
        env:
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_REF="${REGISTRY_URL}/${REGISTRY_REPOSITORY}:${HEAD_SHA}"
          echo "image_ref=$IMAGE_REF" >>"$GITHUB_OUTPUT"

      - name: Verify published image
        env:
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
        run: |
          set -euo pipefail
          timeout_seconds=300
          interval_seconds=10
          max_attempts=$(( (timeout_seconds + interval_seconds - 1) / interval_seconds ))

          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            if docker pull "$IMAGE_REF"; then
              echo "Published image is available: $IMAGE_REF"
              exit 0
            fi

            echo "Attempt $attempt/$max_attempts: image is not published yet, retrying in ${interval_seconds}s"
            sleep "$interval_seconds"
            attempt=$((attempt + 1))
          done

          echo "Image was not published in time: $IMAGE_REF" >&2
          exit 1

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets[matrix.database_url_secret] }}
          MIGRATIONS_MODE: ${{ secrets[matrix.migration_mode_secret] }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "Database URL secret '${{ matrix.database_url_secret }}' is missing; skipping migrations."
            exit 0
          fi

          MODE="${MIGRATIONS_MODE:-check}"
          MODE="$(printf '%s' "$MODE" | tr '[:upper:]' '[:lower:]')"
          if [ "$MODE" != "check" ] && [ "$MODE" != "apply" ]; then
            echo "Invalid migrations mode '$MODE'. Allowed values: check, apply." >&2
            exit 1
          fi

          echo "Running migration preflight (mode=${MODE})"
          docker run --rm \
            -v "$PWD/migrations:/migrations:ro" \
            migrate/migrate:v4.17.1 \
            -path=/migrations \
            -database "$DATABASE_URL" \
            version

          if [ "$MODE" = "check" ]; then
            echo "Migrations mode is 'check'; skipping apply step."
            exit 0
          fi

          docker run --rm \
            -v "$PWD/migrations:/migrations:ro" \
            migrate/migrate:v4.17.1 \
            -path=/migrations \
            -database "$DATABASE_URL" \
            -verbose \
            up

      - name: Trigger environment webhook
        env:
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
          WEBHOOK_URL: ${{ secrets[matrix.webhook_secret] }}
          ENVIRONMENT: ${{ matrix.environment }}
          BRANCH: ${{ matrix.branch }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK_URL:-}" ]; then
            echo "Webhook URL secret '${{ matrix.webhook_secret }}' is missing." >&2
            exit 1
          fi
          printf '{"environment":"%s","branch":"%s","image":"%s","sha":"%s"}\n' \
            "$ENVIRONMENT" "$BRANCH" "$IMAGE_REF" "$HEAD_SHA" >payload.json
          curl -fsSL -X POST -H 'Content-Type: application/json' --data @payload.json "$WEBHOOK_URL"

      - name: Resolve healthcheck target
        id: healthcheck
        env:
          HEALTHCHECK_URL: ${{ secrets[matrix.healthcheck_secret] }}
        run: |
          set -euo pipefail
          if [ -z "${HEALTHCHECK_URL:-}" ]; then
            echo "url=" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          echo "url=$HEALTHCHECK_URL" >>"$GITHUB_OUTPUT"

      - name: Wait for deployment healthcheck
        if: ${{ steps.healthcheck.outputs.url != '' }}
        env:
          HEALTHCHECK_URL: ${{ steps.healthcheck.outputs.url }}
          TIMEOUT_SECONDS: ${{ matrix.healthcheck_timeout }}
          INTERVAL_SECONDS: ${{ matrix.healthcheck_interval }}
        run: |
          set -euo pipefail
          : "${TIMEOUT_SECONDS:=180}"
          : "${INTERVAL_SECONDS:=5}"
          attempt=1
          max_attempts=$(( (TIMEOUT_SECONDS + INTERVAL_SECONDS - 1) / INTERVAL_SECONDS ))
          while [ "$attempt" -le "$max_attempts" ]; do
            if curl -fsSL "$HEALTHCHECK_URL" >/dev/null; then
              echo "Deployment is healthy at attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt/${max_attempts}: service not ready yet"
            sleep "$INTERVAL_SECONDS"
            attempt=$((attempt + 1))
          done
          echo "Deployment did not become healthy before timeout (${TIMEOUT_SECONDS}s)." >&2
          exit 1
