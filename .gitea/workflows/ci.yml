name: FunPot Core CI

on:
  push:
    branches:
      - main
      - dev
      - feature/**
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: funpot-core-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  DOCKER_BUILDKIT: "1"
  BUILDKIT_PROGRESS: plain

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-build
    timeout-minutes: 45

    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_repo: ${{ steps.meta.outputs.image }}
      tags_json: ${{ steps.meta.outputs.tags_json }}
      branch_tag: ${{ steps.meta.outputs.branch_tag }}
      build_date: ${{ steps.meta.outputs.build_date }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version-file: go.mod
          cache: true

      - name: Show environment
        run: |
          set -euo pipefail
          echo "GITHUB_EVENT_NAME=${GITHUB_EVENT_NAME}"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME}"
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "RUNNER_NAME=${RUNNER_NAME:-unknown}"
          echo "RUNNER_OS=${RUNNER_OS:-unknown}"
          echo "RUNNER_ARCH=${RUNNER_ARCH:-unknown}"
          which node || true
          node -v
          go version
          git --version
          docker version
          docker buildx version || true

      - name: Verify formatting
        run: |
          set -euo pipefail
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "These files are not formatted:"
            echo "$out"
            exit 1
          fi

      - name: Verify go.mod / go.sum
        run: |
          set -euo pipefail
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet
        run: |
          set -euo pipefail
          go vet ./...

      - name: Test
        run: |
          set -euo pipefail
          go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        if: ${{ github.event_name != 'pull_request' && secrets.REGISTRY_URL != '' && secrets.REGISTRY_REPOSITORY != '' }}
        run: |
          set -euo pipefail

          IMAGE="${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_REPOSITORY }}"
          SHA="${GITHUB_SHA}"
          BRANCH="${GITHUB_REF_NAME}"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          BRANCH_TAG=""
          if [ "$BRANCH" = "main" ]; then
            BRANCH_TAG="prod"
          elif [ "$BRANCH" = "dev" ]; then
            BRANCH_TAG="dev"
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE}:${SHA}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "branch_tag=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"

          {
            echo 'tags_json<<EOF'
            if [ -n "$BRANCH_TAG" ]; then
              printf '["%s:%s","%s:%s"]\n' "$IMAGE" "$SHA" "$IMAGE" "$BRANCH_TAG"
            else
              printf '["%s:%s"]\n' "$IMAGE" "$SHA"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Log in to container registry
        if: ${{ github.event_name != 'pull_request' && steps.meta.outputs.image_ref != '' && secrets.REGISTRY_USERNAME != '' && secrets.REGISTRY_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & Push immutable SHA tag
        if: ${{ github.event_name != 'pull_request' && steps.meta.outputs.image_ref != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.image_ref }}
          provenance: false
          sbom: false
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache,mode=max

      - name: Tag SHA image as rolling branch tag
        if: ${{ github.event_name != 'pull_request' && steps.meta.outputs.branch_tag != '' }}
        run: |
          set -euo pipefail

          IMAGE="${{ steps.meta.outputs.image }}"
          SHA_IMAGE="${{ steps.meta.outputs.image_ref }}"
          ROLLING_IMAGE="${IMAGE}:${{ steps.meta.outputs.branch_tag }}"

          docker pull "$SHA_IMAGE"
          docker tag "$SHA_IMAGE" "$ROLLING_IMAGE"
          docker push "$ROLLING_IMAGE"

      - name: Verify pushed tags
        if: ${{ github.event_name != 'pull_request' && steps.meta.outputs.image_ref != '' }}
        run: |
          set -euo pipefail

          IMAGE="${{ steps.meta.outputs.image }}"
          SHA_IMAGE="${{ steps.meta.outputs.image_ref }}"
          docker buildx imagetools inspect "$SHA_IMAGE"

          if [ -n "${{ steps.meta.outputs.branch_tag }}" ]; then
            ROLLING_IMAGE="${IMAGE}:${{ steps.meta.outputs.branch_tag }}"
            docker buildx imagetools inspect "$ROLLING_IMAGE"
          fi

      - name: Build only for PR
        if: ${{ github.event_name == 'pull_request' || steps.meta.outputs.image_ref == '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: false
          provenance: false
          sbom: false
          build-args: |
            VCS_REF=${{ github.sha }}

  migrations:
    name: Migration Preflight (${{ matrix.environment }})
    runs-on: ubuntu-build
    timeout-minutes: 15
    if: ${{ github.event_name != 'pull_request' && github.ref_name == matrix.branch }}
    strategy:
      matrix:
        include:
          - environment: development
            branch: dev
            database_host_secret: DEV_DATABASE_HOST
            database_port_secret: DEV_DATABASE_PORT
            database_name_secret: DEV_DATABASE_NAME
            database_user_secret: DEV_DATABASE_USER
            database_password_secret: DEV_DATABASE_PASSWORD
            database_sslmode_secret: DEV_DATABASE_SSLMODE
            migration_mode_secret: DEV_MIGRATIONS_MODE
          - environment: production
            branch: main
            database_host_secret: PROD_DATABASE_HOST
            database_port_secret: PROD_DATABASE_PORT
            database_name_secret: PROD_DATABASE_NAME
            database_user_secret: PROD_DATABASE_USER
            database_password_secret: PROD_DATABASE_PASSWORD
            database_sslmode_secret: PROD_DATABASE_SSLMODE
            migration_mode_secret: PROD_MIGRATIONS_MODE

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run migration preflight
        env:
          DATABASE_HOST: ${{ secrets[matrix.database_host_secret] }}
          DATABASE_PORT: ${{ secrets[matrix.database_port_secret] }}
          DATABASE_NAME: ${{ secrets[matrix.database_name_secret] }}
          DATABASE_USER: ${{ secrets[matrix.database_user_secret] }}
          DATABASE_PASSWORD: ${{ secrets[matrix.database_password_secret] }}
          DATABASE_SSLMODE: ${{ secrets[matrix.database_sslmode_secret] }}
          MIGRATIONS_MODE: ${{ secrets[matrix.migration_mode_secret] }}
        run: |
          set -euo pipefail

          MODE="${MIGRATIONS_MODE:-check}"
          MODE="$(printf '%s' "$MODE" | tr '[:upper:]' '[:lower:]')"
          if [ "$MODE" != "check" ] && [ "$MODE" != "apply" ]; then
            echo "Invalid migrations mode '$MODE'. Allowed values: check, apply." >&2
            exit 1
          fi

          if [ "$MODE" = "check" ]; then
            echo "Running migration preflight for ${{ matrix.environment }} (mode=${MODE})"
            echo "Validating migration files naming and up/down pairs (database connection is not required in check mode)."

            mapfile -t up_files < <(find migrations -maxdepth 1 -type f -name '*.up.sql' -printf '%f\n' | sort)
            mapfile -t down_files < <(find migrations -maxdepth 1 -type f -name '*.down.sql' -printf '%f\n' | sort)

            if [ "${#up_files[@]}" -eq 0 ]; then
              echo "No '*.up.sql' files found in migrations/." >&2
              exit 1
            fi

            if [ "${#up_files[@]}" -ne "${#down_files[@]}" ]; then
              echo "Migrations mismatch: ${#up_files[@]} up files vs ${#down_files[@]} down files." >&2
              exit 1
            fi

            for up_file in "${up_files[@]}"; do
              version="${up_file%%_*}"
              case "$version" in
                ''|*[!0-9]*)
                  echo "Invalid migration version prefix in '$up_file'. Expected '<number>_<name>.up.sql'." >&2
                  exit 1
                  ;;
              esac

              expected_down="${up_file%.up.sql}.down.sql"
              if [ ! -f "migrations/$expected_down" ]; then
                echo "Missing down migration for '$up_file' (expected '$expected_down')." >&2
                exit 1
              fi
            done

            echo "Migrations mode is 'check'; migration files preflight completed successfully."
            exit 0
          fi

          required_vars=(DATABASE_HOST DATABASE_PORT DATABASE_NAME DATABASE_USER DATABASE_PASSWORD)
          missing=0
          for v in "${required_vars[@]}"; do
            if [ -z "${!v:-}" ]; then
              echo "Database secret for $v is missing; skipping migrations."
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 0
          fi

          if [ -z "${DATABASE_SSLMODE:-}" ]; then
            DATABASE_SSLMODE="require"
          fi

          DATABASE_URL="postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}?sslmode=${DATABASE_SSLMODE}"

          echo "Running migration preflight for ${{ matrix.environment }} (mode=${MODE})"
          docker run --rm \
            -v "$PWD/migrations:/migrations:ro" \
            migrate/migrate:v4.17.1 \
            -path=/migrations \
            -database "$DATABASE_URL" \
            version

          docker run --rm \
            -v "$PWD/migrations:/migrations:ro" \
            migrate/migrate:v4.17.1 \
            -path=/migrations \
            -database "$DATABASE_URL" \
            -verbose \
            up

  smoke:
    name: Smoke Test
    needs: build
    runs-on: ubuntu-build
    timeout-minutes: 20
    if: ${{ github.event_name != 'pull_request' && needs.build.outputs.image_ref != '' }}

    env:
      IMAGE_REF: ${{ needs.build.outputs.image_ref }}
      REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      FUNPOT_ENV: ci
      FUNPOT_SERVER_ADDRESS: :8080
      FUNPOT_AUTH_TELEGRAM_BOT_TOKEN: ${{ secrets.FUNPOT_AUTH_TELEGRAM_BOT_TOKEN }}

    steps:
      - name: Validate required variables
        run: |
          set -euo pipefail
          for v in IMAGE_REF REGISTRY_URL REGISTRY_USERNAME REGISTRY_PASSWORD FUNPOT_AUTH_TELEGRAM_BOT_TOKEN; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required variable: $v" >&2
              exit 1
            fi
          done

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Pull image
        run: |
          set -euo pipefail
          docker pull "$IMAGE_REF"
          docker image inspect "$IMAGE_REF" --format 'ID={{.Id}} RepoDigests={{json .RepoDigests}}'

      - name: Smoke test
        run: |
          set -euo pipefail

          docker rm -f funpot-ci-test >/dev/null 2>&1 || true

          cid="$(docker run -d \
            --name funpot-ci-test \
            -e FUNPOT_ENV="$FUNPOT_ENV" \
            -e FUNPOT_SERVER_ADDRESS="$FUNPOT_SERVER_ADDRESS" \
            -e FUNPOT_AUTH_TELEGRAM_BOT_TOKEN="$FUNPOT_AUTH_TELEGRAM_BOT_TOKEN" \
            "$IMAGE_REF")"

          cleanup() {
            echo "===== container logs ====="
            docker logs "$cid" || true
            echo "===== inspect state ====="
            docker inspect "$cid" --format '{{json .State}}' || true
            docker rm -f "$cid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          echo "Started container: $cid"

          ok_health=0
          for i in $(seq 1 30); do
            if ! docker ps --format '{{.Names}}' | grep -qx funpot-ci-test; then
              echo "Container exited early"
              exit 1
            fi

            if docker run --rm --network "container:$cid" curlimages/curl:8.9.0 -fsS "http://127.0.0.1:8080/healthz" >/dev/null; then
              ok_health=1
              echo "healthz is OK"
              break
            fi

            echo "Waiting for /healthz... attempt $i/30"
            sleep 2
          done

          if [ "$ok_health" -ne 1 ]; then
            echo "/healthz did not become ready in time"
            exit 1
          fi

          docker run --rm --network "container:$cid" curlimages/curl:8.9.0 -fsS "http://127.0.0.1:8080/readyz" >/dev/null
          echo "readyz is OK"
