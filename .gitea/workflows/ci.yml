name: FunPot Core CI

on:
  push:
    branches:
      - main
      - dev
      - feature/**
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: funpot-core-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  DOCKER_BUILDKIT: "1"
  BUILDKIT_PROGRESS: plain

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-build
    timeout-minutes: 45

    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_repo: ${{ steps.meta.outputs.image }}
      tags_json: ${{ steps.meta.outputs.tags_json }}
      branch_tag: ${{ steps.meta.outputs.branch_tag }}
      build_date: ${{ steps.meta.outputs.build_date }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version-file: go.mod
          cache: true

      - name: Show environment
        run: |
          set -euo pipefail
          echo "GITHUB_EVENT_NAME=${GITHUB_EVENT_NAME}"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME}"
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "RUNNER_NAME=${RUNNER_NAME:-unknown}"
          echo "RUNNER_OS=${RUNNER_OS:-unknown}"
          echo "RUNNER_ARCH=${RUNNER_ARCH:-unknown}"
          go version
          docker version
          docker buildx version || true

      - name: Verify formatting
        run: |
          set -euo pipefail
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "These files are not formatted:"
            echo "$out"
            exit 1
          fi

      - name: Verify go.mod / go.sum
        run: |
          set -euo pipefail
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet
        run: |
          set -euo pipefail
          go vet ./...

      - name: Test
        run: |
          set -euo pipefail
          go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        if: ${{ github.event_name != 'pull_request' && secrets.REGISTRY_URL != '' && secrets.REGISTRY_REPOSITORY != '' }}
        run: |
          set -euo pipefail

          IMAGE="${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_REPOSITORY }}"
          SHA="${GITHUB_SHA}"
          BRANCH="${GITHUB_REF_NAME}"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          BRANCH_TAG=""
          if [ "$BRANCH" = "main" ]; then
            BRANCH_TAG="prod"
          elif [ "$BRANCH" = "dev" ]; then
            BRANCH_TAG="dev"
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE}:${SHA}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "branch_tag=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"

          {
            echo 'tags_json<<EOF'
            if [ -n "$BRANCH_TAG" ]; then
              printf '["%s:%s","%s:%s"]\n' "$IMAGE" "$SHA" "$IMAGE" "$BRANCH_TAG"
            else
              printf '["%s:%s"]\n' "$IMAGE" "$SHA"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "Resolved image: $IMAGE"
          echo "Resolved immutable tag: ${IMAGE}:${SHA}"
          if [ -n "$BRANCH_TAG" ]; then
            echo "Resolved rolling tag: ${IMAGE}:${BRANCH_TAG}"
          else
            echo "No rolling tag for branch: $BRANCH"
          fi
          echo "Build date: $BUILD_DATE"

      - name: Log in to container registry
        if: ${{ github.event_name != 'pull_request' && steps.meta.outputs.image_ref != '' && secrets.REGISTRY_USERNAME != '' && secrets.REGISTRY_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & Push immutable SHA tag
        if: ${{ github.event_name != 'pull_request' && steps.meta.outputs.image_ref != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.image_ref }}
          provenance: false
          sbom: false
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache,mode=max

      - name: Tag SHA image as rolling branch tag
        if: ${{ github.event_name != 'pull_request' && steps.meta.outputs.branch_tag != '' }}
        run: |
          set -euo pipefail

          IMAGE="${{ steps.meta.outputs.image }}"
          SHA_IMAGE="${{ steps.meta.outputs.image_ref }}"
          ROLLING_IMAGE="${IMAGE}:${{ steps.meta.outputs.branch_tag }}"

          echo "Pulling immutable image: $SHA_IMAGE"
          docker pull "$SHA_IMAGE"

          echo "Tagging as rolling image: $ROLLING_IMAGE"
          docker tag "$SHA_IMAGE" "$ROLLING_IMAGE"

          echo "Pushing rolling image: $ROLLING_IMAGE"
          docker push "$ROLLING_IMAGE"

      - name: Verify pushed tags
        if: ${{ github.event_name != 'pull_request' && steps.meta.outputs.image_ref != '' }}
        run: |
          set -euo pipefail

          IMAGE="${{ steps.meta.outputs.image }}"
          SHA_IMAGE="${{ steps.meta.outputs.image_ref }}"

          echo "Inspecting remote SHA tag..."
          docker buildx imagetools inspect "$SHA_IMAGE"

          if [ -n "${{ steps.meta.outputs.branch_tag }}" ]; then
            ROLLING_IMAGE="${IMAGE}:${{ steps.meta.outputs.branch_tag }}"
            echo "Inspecting remote rolling tag..."
            docker buildx imagetools inspect "$ROLLING_IMAGE"
          fi

      - name: Build only for PR
        if: ${{ github.event_name == 'pull_request' || steps.meta.outputs.image_ref == '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: false
          provenance: false
          sbom: false
          build-args: |
            VCS_REF=${{ github.sha }}

  smoke:
    name: Smoke Test
    needs: build
    runs-on: ubuntu-build
    timeout-minutes: 20
    if: ${{ github.event_name != 'pull_request' && needs.build.outputs.image_ref != '' }}

    env:
      IMAGE_REF: ${{ needs.build.outputs.image_ref }}
      REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      FUNPOT_ENV: ci
      FUNPOT_SERVER_ADDRESS: :8080
      FUNPOT_AUTH_TELEGRAM_BOT_TOKEN: ${{ secrets.FUNPOT_AUTH_TELEGRAM_BOT_TOKEN }}

    steps:
      - name: Validate required variables
        run: |
          set -euo pipefail
          for v in IMAGE_REF REGISTRY_URL REGISTRY_USERNAME REGISTRY_PASSWORD FUNPOT_AUTH_TELEGRAM_BOT_TOKEN; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required variable: $v" >&2
              exit 1
            fi
          done

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Pull image
        run: |
          set -euo pipefail
          docker pull "$IMAGE_REF"
          docker image inspect "$IMAGE_REF" --format 'ID={{.Id}} RepoDigests={{json .RepoDigests}}'

      - name: Smoke test
        run: |
          set -euo pipefail

          docker rm -f funpot-ci-test >/dev/null 2>&1 || true

          cid="$(docker run -d \
            --name funpot-ci-test \
            -e FUNPOT_ENV="$FUNPOT_ENV" \
            -e FUNPOT_SERVER_ADDRESS="$FUNPOT_SERVER_ADDRESS" \
            -e FUNPOT_AUTH_TELEGRAM_BOT_TOKEN="$FUNPOT_AUTH_TELEGRAM_BOT_TOKEN" \
            "$IMAGE_REF")"

          cleanup() {
            echo "===== container logs ====="
            docker logs "$cid" || true
            echo "===== inspect state ====="
            docker inspect "$cid" --format '{{json .State}}' || true
            docker rm -f "$cid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          echo "Started container: $cid"

          ok_health=0
          for i in $(seq 1 30); do
            if ! docker ps --format '{{.Names}}' | grep -qx funpot-ci-test; then
              echo "Container exited early"
              exit 1
            fi

            if docker run --rm --network "container:$cid" curlimages/curl:8.9.0 -fsS "http://127.0.0.1:8080/healthz" >/dev/null; then
              ok_health=1
              echo "healthz is OK"
              break
            fi

            echo "Waiting for /healthz... attempt $i/30"
            sleep 2
          done

          if [ "$ok_health" -ne 1 ]; then
            echo "/healthz did not become ready in time"
            exit 1
          fi

          docker run --rm --network "container:$cid" curlimages/curl:8.9.0 -fsS "http://127.0.0.1:8080/readyz" >/dev/null
          echo "readyz is OK"
