openapi: 3.1.0
info:
  title: FunPot Backend API
  version: 1.0.0
  description: REST API for the FunPot Telegram Mini App platform.
servers:
  - url: https://api.funpot.example
paths:
  /realtime:
    get:
      summary: WebSocket upgrade endpoint for realtime mini-game updates
      description: |
        Upgrades HTTP connection to WebSocket (JWT required) and streams realtime messages.
        Message contracts are documented in `docs/ws_messages.md`.
      parameters:
        - in: query
          name: streamerId
          required: true
          schema:
            type: string
          description: Streamer subscription scope for mini-game/event updates.
      responses:
        '101':
          description: Switching Protocols (WebSocket upgrade successful)
        default:
          $ref: '#/components/responses/Error'
  /api/auth/telegram:
    post:
      summary: Authenticate via Telegram Mini App initData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [initData]
              properties:
                initData:
                  type: string
      responses:
        '200':
          description: Authentication succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time
                  refreshToken:
                    type: string
                  refreshExpiresAt:
                    type: string
                    format: date-time
                  sessionId:
                    type: string
                  user:
                    $ref: '#/components/schemas/UserProfile'
        default:
          $ref: '#/components/responses/Error'
  /api/auth/refresh:
    post:
      summary: Rotate refresh session and issue new tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token pair rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        default:
          $ref: '#/components/responses/Error'
  /api/auth/logout:
    post:
      summary: Revoke a single refresh session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Session revoked
        default:
          $ref: '#/components/responses/Error'
  /api/auth/logout-all:
    post:
      summary: Revoke all refresh sessions for authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All sessions revoked
        default:
          $ref: '#/components/responses/Error'
  /api/me:
    get:
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        default:
          $ref: '#/components/responses/Error'
    put:
      summary: Update current user profile nickname
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeNicknameUpdateRequest'
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        default:
          $ref: '#/components/responses/Error'
  /api/config:
    get:
      summary: Get configuration and feature flags
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Configuration payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientConfig'
        default:
          $ref: '#/components/responses/Error'
  /api/streamers:
    get:
      summary: List streamers
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: query
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        '200':
          description: Streamer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Streamer'
        default:
          $ref: '#/components/responses/Error'
    post:
      summary: Submit a streamer for Twitch validation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              anyOf:
                - required: [twitchNickname]
                - required: [twitchUsername]
              properties:
                twitchNickname:
                  type: string
                  description: Twitch login to track (preferred field).
                twitchUsername:
                  type: string
                  description: Legacy alias for twitchNickname.
                  deprecated: true
      responses:
        '200':
          description: Streamer submission result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamerSubmission'
        '400':
          description: Invalid payload or streamer is not eligible for tracking (offline / low audience / invalid username)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidUsername:
                  summary: Missing username
                  value:
                    error: twitchNickname is required
                twitchUnavailable:
                  summary: Twitch validation failed
                  value:
                    error: failed to validate twitch username
                streamerOffline:
                  summary: Streamer is offline
                  value:
                    error: streamer is offline
                insufficientViewers:
                  summary: Viewers below threshold
                  value:
                    error: streamer has insufficient live viewers
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          $ref: '#/components/responses/Error'
  /api/streamers/{streamerId}/status:
    get:
      summary: Get aggregated LLM match-tracker status for streamer
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: streamerId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Aggregated match-session / state-tracker status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMStatus'
        default:
          $ref: '#/components/responses/Error'
  /api/streamers/{streamerId}/tracking:
    delete:
      summary: Stop streamer analysis tracking
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: streamerId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated streamer tracking status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMStatus'
        default:
          $ref: '#/components/responses/Error'

  /api/admin/users:
    get:
      summary: List users with search and pagination (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: query
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            default: 20
      responses:
        '200':
          description: Paginated users list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUsersResponse'
        default:
          $ref: '#/components/responses/Error'

  /api/admin/users/{userId}:
    get:
      summary: Get user by id (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        default:
          $ref: '#/components/responses/Error'
    put:
      summary: Update user by id (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
        - in: header
          name: Idempotency-Key
          required: false
          description: Required when `balanceDeltaINT` is provided in request body.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpsertRequest'
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/users/{userId}/ban:
    put:
      summary: Ban or unban user by id (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserBanRequest'
      responses:
        '200':
          description: Updated user profile with ban state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        default:
          $ref: '#/components/responses/Error'

  /api/admin/settings/general:
    get:
      summary: Get general platform settings (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current general settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminGeneralSettings'
        default:
          $ref: '#/components/responses/Error'
    put:
      summary: Update general platform settings (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminGeneralSettingsUpdateRequest'
      responses:
        '200':
          description: Updated general settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminGeneralSettings'
        default:
          $ref: '#/components/responses/Error'

  /api/admin/games:
    get:
      summary: List games (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Game list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Game'
        default:
          $ref: '#/components/responses/Error'
    post:
      summary: Create game (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameUpsertRequest'
      responses:
        '201':
          description: Created game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/games/{gameId}:
    put:
      summary: Update game (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: gameId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameUpsertRequest'
      responses:
        '200':
          description: Updated game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        default:
          $ref: '#/components/responses/Error'
    delete:
      summary: Delete game (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: gameId
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Game deleted
        default:
          $ref: '#/components/responses/Error'
  /api/admin/streamers/{streamerId}/llm-history:
    get:
      summary: Get streamer LLM history (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: streamerId
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            default: 20
      responses:
        '200':
          description: Paginated streamer LLM history with uploaded videos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStreamerLLMHistoryResponse'
        default:
          $ref: '#/components/responses/Error'
    delete:
      summary: Clear streamer LLM history (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: streamerId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Streamer history and uploaded videos cleanup result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStreamerHistoryDeleteResponse'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/llm/model-configs:
    get:
      summary: List LLM model configs (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: LLM model configs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LLMModelConfig'
        default:
          $ref: '#/components/responses/Error'
    post:
      summary: Create LLM model config (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LLMModelConfigUpsertRequest'
      responses:
        '201':
          description: Created LLM model config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMModelConfig'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/llm/model-configs/{modelConfigId}:
    put:
      summary: Update LLM model config (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: modelConfigId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LLMModelConfigUpsertRequest'
      responses:
        '200':
          description: Updated LLM model config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMModelConfig'
        default:
          $ref: '#/components/responses/Error'
    delete:
      summary: Delete LLM model config (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: modelConfigId
          required: true
          schema:
            type: string
      responses:
        '204':
          description: LLM model config deleted
        default:
          $ref: '#/components/responses/Error'
  /api/admin/llm/model-configs/{modelConfigId}/activate:
    post:
      summary: Activate LLM model config (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: modelConfigId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Activated LLM model config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMModelConfig'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/llm/scenario-packages:
    get:
      summary: List LLM scenario packages (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: LLM scenario packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScenarioPackageVersion'
        default:
          $ref: '#/components/responses/Error'
    post:
      summary: Create LLM scenario package (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenarioPackageCreateRequest'
      responses:
        '201':
          description: Created LLM scenario package
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioPackageVersion'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/llm/scenario-packages/{scenarioPackageId}:
    get:
      summary: Get LLM scenario package (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: scenarioPackageId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: LLM scenario package
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioPackageVersion'
        default:
          $ref: '#/components/responses/Error'
    put:
      summary: Update LLM scenario package (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: scenarioPackageId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenarioPackageCreateRequest'
      responses:
        '200':
          description: Updated LLM scenario package
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioPackageVersion'
        default:
          $ref: '#/components/responses/Error'
    delete:
      summary: Delete LLM scenario package (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: scenarioPackageId
          required: true
          schema:
            type: string
      responses:
        '204':
          description: LLM scenario package deleted
        default:
          $ref: '#/components/responses/Error'
  /api/admin/llm/scenario-packages/{scenarioPackageId}/activate:
    post:
      summary: Activate LLM scenario package (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: scenarioPackageId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Activated LLM scenario package
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioPackageVersion'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/llm/scenario-packages/{scenarioPackageId}/graph:
    get:
      summary: Get LLM scenario package visual graph (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: scenarioPackageId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: LLM scenario package visual graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioPackageGraph'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/llm/game-scenarios:
    get:
      summary: List game scenarios built from scenario packages (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Game scenarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GameScenario'
        default:
          $ref: '#/components/responses/Error'
    post:
      summary: Create game scenario graph (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameScenarioCreateRequest'
      responses:
        '201':
          description: Created game scenario graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameScenario'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/llm/game-scenarios/{gameScenarioId}:
    get:
      summary: Get game scenario graph (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: gameScenarioId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Game scenario graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameScenario'
        default:
          $ref: '#/components/responses/Error'
    put:
      summary: Update game scenario graph (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: gameScenarioId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameScenarioCreateRequest'
      responses:
        '200':
          description: Updated game scenario graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameScenario'
        default:
          $ref: '#/components/responses/Error'
    delete:
      summary: Delete game scenario graph (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: gameScenarioId
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Game scenario graph deleted
        default:
          $ref: '#/components/responses/Error'
  /api/admin/llm/game-scenarios/{gameScenarioId}/activate:
    post:
      summary: Activate game scenario graph (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: gameScenarioId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Activated game scenario graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameScenario'
        default:
          $ref: '#/components/responses/Error'
  /api/events/live:
    get:
      summary: Get live events for a streamer
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: streamerId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Live events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LiveEvent'
        default:
          $ref: '#/components/responses/Error'
  /api/events/{eventId}/vote:
    post:
      summary: Cast a vote for live event outcome using in-game currency (FPC)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: string
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventVoteRequest'
      responses:
        '200':
          description: Updated live event after vote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveEvent'
        default:
          $ref: '#/components/responses/Error'
  /api/events/history:
    get:
      summary: Get authenticated user event vote history
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User event history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserEventHistoryStreamerItem'
        default:
          $ref: '#/components/responses/Error'
  /api/wallet:
    get:
      summary: Get wallet balance and history
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Wallet information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wallet'
        default:
          $ref: '#/components/responses/Error'
  /api/payments/stars/createInvoice:
    post:
      summary: Create Telegram Stars invoice
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amountINT]
              properties:
                amountINT:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Invoice payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StarsInvoice'
        default:
          $ref: '#/components/responses/Error'
  /api/wallet/withdraw:
    post:
      summary: Request withdrawal
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amountINT]
              properties:
                amountINT:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Withdrawal status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WithdrawResponse'
        default:
          $ref: '#/components/responses/Error'
  /api/referrals/summary:
    get:
      summary: Get referral summary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Referral information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferralSummary'
        default:
          $ref: '#/components/responses/Error'
  /api/referrals/payouts:
    get:
      summary: Get referral payout history
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Referral payout history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReferralPayout'
        default:
          $ref: '#/components/responses/Error'
  /api/media/clips:
    get:
      summary: List media clips for a streamer
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: streamerId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Clip list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MediaClip'
        default:
          $ref: '#/components/responses/Error'
  /integrations/telegram/payments:
    post:
      summary: Telegram payments webhook
      security:
        - telegramSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramPaymentWebhook'
      responses:
        '200':
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        default:
          $ref: '#/components/responses/Error'
  /internal/worker/events:
    post:
      summary: Ingest worker-generated events
      security:
        - workerSignature: []
      parameters:
        - in: header
          name: X-Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerEvents'
      responses:
        '200':
          description: Worker ingest outcome
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerEventsResponse'
        default:
          $ref: '#/components/responses/Error'
  /internal/worker/media:
    post:
      summary: Ingest worker media metadata
      security:
        - workerSignature: []
      parameters:
        - in: header
          name: X-Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerMedia'
      responses:
        '200':
          description: Media accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        default:
          $ref: '#/components/responses/Error'
  /internal/worker/streamer-status:
    post:
      summary: Update streamer status from worker
      security:
        - workerSignature: []
      parameters:
        - in: header
          name: X-Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerStreamerStatus'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        default:
          $ref: '#/components/responses/Error'
  /internal/commands/assign-streamer:
    post:
      summary: Assign streamer monitoring to worker
      security:
        - workerSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [streamerId, twitchNickname]
              properties:
                streamerId:
                  type: string
                  format: uuid
                twitchNickname:
                  type: string
      responses:
        '200':
          description: Assignment acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        default:
          $ref: '#/components/responses/Error'
  /internal/commands/unassign-streamer:
    post:
      summary: Remove streamer monitoring assignment
      security:
        - workerSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [streamerId]
              properties:
                streamerId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Unassignment acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        default:
          $ref: '#/components/responses/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    workerSignature:
      type: apiKey
      in: header
      name: X-Worker-Signature
    telegramSignature:
      type: apiKey
      in: header
      name: X-Telegram-Signature
  responses:
    Error:
      description: Error envelope
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                required: [code, message]
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  details:
                    type: object
                    additionalProperties: true
  schemas:
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    RefreshResponse:
      type: object
      properties:
        token:
          type: string
        expiresAt:
          type: string
          format: date-time
        refreshToken:
          type: string
        refreshExpiresAt:
          type: string
          format: date-time
        sessionId:
          type: string
    UserProfile:
      type: object
      properties:
        id:
          type: string
        telegramId:
          type: integer
        username:
          type: string
        nickname:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        languageCode:
          type: string
        referralCode:
          type: string
        isBanned:
          type: boolean
        banReason:
          type: string
        bannedAt:
          type: string
          format: date-time
        bannedUntil:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        isAdmin:
          type: boolean
          description: Indicates whether the authenticated user has admin privileges.
    MeNicknameUpdateRequest:
      type: object
      required: [nickname]
      properties:
        nickname:
          type: string
    AdminUserUpsertRequest:
      type: object
      properties:
        telegramId:
          type: integer
          minimum: 1
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        languageCode:
          type: string
        balanceDeltaINT:
          type: integer
          description: Signed amount in in-game currency units (FPC). Positive = credit, negative = debit.
        balanceReason:
          type: string
          description: Required when `balanceDeltaINT` is provided.
    AdminUsersResponse:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserProfile'
    AdminUserBanRequest:
      type: object
      required: [isBanned]
      properties:
        isBanned:
          type: boolean
        reason:
          type: string
        durationMs:
          type: integer
          minimum: 0
    ClientConfig:
      type: object
      properties:
        starsRate:
          type: number
        minViewers:
          type: integer
        features:
          type: object
          properties:
            paymentsEnabled:
              type: boolean
            referralsEnabled:
              type: boolean
            mediaEnabled:
              type: boolean
            adminEnabled:
              type: boolean
        limits:
          type: object
          properties:
            votePerMin:
              type: integer
    Streamer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        platform:
          type: string
          enum: [twitch]
        twitchNickname:
          type: string
        displayName:
          type: string
        miniIconUrl:
          type: string
          format: uri
        online:
          type: boolean
        viewers:
          type: integer
        addedBy:
          type: string
          format: uuid
        status:
          type: string
          enum: [ok, pending, rejected, banned]
    StreamerSubmission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [ok, pending, rejected]
        reason:
          type: string
          nullable: true

    LLMStatus:
      type: object
      required: [streamerId, state, latestByStage, history]
      properties:
        streamerId:
          type: string
        state:
          type: string
          enum: [idle, active, stopped]
        currentRunId:
          type: string
        currentStage:
          type: string
        currentLabel:
          type: string
        currentConfidence:
          type: number
          format: double
        detectedGameKey:
          type: string
        updatedAt:
          type: string
          format: date-time
        latestByStage:
          type: array
          items:
            $ref: '#/components/schemas/LLMDecision'
        history:
          type: array
          description: Full chronological LLM decision history for the streamer, including per-call request/response payloads.
          items:
            $ref: '#/components/schemas/LLMDecision'

    LLMDecision:
      type: object
      properties:
        id:
          type: string
        runId:
          type: string
        streamerId:
          type: string
        stage:
          type: string
          description: Tracker stage, for example `match_update`, `match_finalize`, or `match_discovery`.
        label:
          type: string
        confidence:
          type: number
        chunkCapturedAt:
          type: string
          format: date-time
        promptVersionId:
          type: string
        promptText:
          type: string
        model:
          type: string
        temperature:
          type: number
        maxTokens:
          type: integer
        timeoutMs:
          type: integer
        videoData:
          type: string
          description: Media reference for the analyzed chunk (for example a playback URL or storage reference).
        requestRef:
          type: string
        responseRef:
          type: string
        requestPayload:
          type: string
          description: JSON payload sent to the upstream LLM provider for this decision.
        responsePayload:
          type: string
          description: Raw HTTP response body returned by the upstream LLM provider.
        rawResponse:
          type: string
          description: Raw strict-JSON payload returned by the active scenario step.
        tokensIn:
          type: integer
        tokensOut:
          type: integer
        latencyMs:
          type: integer
        transitionOutcome:
          type: string
        transitionToStep:
          type: string
        transitionTerminal:
          type: boolean
        previousStateJson:
          type: string
        updatedStateJson:
          type: string
          description: Scenario-defined strict-JSON payload returned by the active step and persisted as current state snapshot.
        evidenceDeltaJson:
          type: string
          description: Deprecated legacy field retained for backward compatibility; new runtime does not require a dedicated delta key.
        conflictsJson:
          type: string
          description: Deprecated legacy field retained for backward compatibility; new runtime does not require a dedicated conflicts key.
        finalOutcome:
          type: string
          description: Deprecated legacy field retained for backward compatibility; scenario schema defines any terminal outcome semantics.
        createdAt:
          type: string
          format: date-time
    UploadedVideo:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        url:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
    AdminHistoryEvent:
      allOf:
        - $ref: '#/components/schemas/LLMDecision'
        - type: object
          properties:
            eventTime:
              type: string
              format: date-time
            stepName:
              type: string
            llmResponse:
              type: string
            globalStateDelta:
              type: string
            confidence:
              type: number
    AdminStreamerLLMHistoryResponse:
      type: object
      required: [streamerId, page, pageSize, total, items, videos]
      properties:
        streamerId:
          type: string
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminHistoryEvent'
        videos:
          type: array
          items:
            $ref: '#/components/schemas/UploadedVideo'
    AdminStreamerHistoryDeleteResponse:
      type: object
      required: [streamerId, deletedDecisions, deletedBunnyVideos]
      properties:
        streamerId:
          type: string
        deletedDecisions:
          type: integer
        deletedBunnyVideos:
          type: integer
    GameUpsertRequest:
      type: object
      required: [slug, title, status]
      properties:
        slug:
          type: string
        title:
          type: string
        description:
          type: string
        rules:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, active, archived]
    Game:
      type: object
      properties:
        id:
          type: string
          format: uuid
        streamerId:
          type: string
          format: uuid
        title:
          type: string
        rules:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [active, upcoming, closed, draft, paused]
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
          nullable: true
    LLMModelConfigUpsertRequest:
      type: object
      required: [name, model]
      properties:
        name:
          type: string
        model:
          type: string
        metadataJson:
          type: string
        temperature:
          type: number
        maxTokens:
          type: integer
        timeoutMs:
          type: integer
        retryCount:
          type: integer
        backoffMs:
          type: integer
        cooldownMs:
          type: integer
        minConfidence:
          type: number
    LLMModelConfig:
      allOf:
        - $ref: '#/components/schemas/LLMModelConfigUpsertRequest'
        - type: object
          required: [id, isActive, createdBy, createdAt]
          properties:
            id:
              type: string
            isActive:
              type: boolean
            createdBy:
              type: string
            activatedBy:
              type: string
              nullable: true
            createdAt:
              type: string
              format: date-time
            activatedAt:
              type: string
              format: date-time
              nullable: true
    ScenarioStepRequest:
      type: object
      required: [id, name, promptTemplate, responseSchemaJson, initial, order]
      additionalProperties: false
      properties:
        id:
          type: string
        name:
          type: string
        gameSlug:
          type: string
        folder:
          type: string
        entryCondition:
          type: string
        promptTemplate:
          type: string
        responseSchemaJson:
          type: string
          description: JSON schema/template contract that the LLM response must follow exactly (legacy coercion is not applied).
        segmentSeconds:
          type: integer
          minimum: 1
          description: Video segment duration in seconds for this step. Defaults to 15 for the initial step and 30 for all other steps.
        maxRequests:
          type: integer
          minimum: 0
          description: Maximum number of LLM requests allowed for this step (0 = unlimited). If a non-initial step reaches this limit runtime returns to the initial step; if the initial step reaches this limit runtime stops tracking the streamer.
        initial:
          type: boolean
          description: Exactly one step in the package must have `initial=true`. Runtime always starts from this step before transitioning to scenario branches.
        order:
          type: integer
          minimum: 1
    ScenarioStep:
      allOf:
        - $ref: '#/components/schemas/ScenarioStepRequest'
        - type: object
          properties:
            segmentSeconds:
              type: integer
              minimum: 1
              description: Video segment duration in seconds for this step. Defaults to 15 for the initial step and 30 for all other steps.
            maxRequests:
              type: integer
              minimum: 0
              description: Maximum number of LLM requests allowed for this step (0 = unlimited). If a non-initial step reaches this limit runtime returns to the initial step; if the initial step reaches this limit runtime stops tracking the streamer.
    ScenarioTransition:
      type: object
      required: [fromStepId, toStepId, condition, priority]
      additionalProperties: false
      properties:
        fromStepId:
          type: string
        toStepId:
          type: string
        condition:
          type: string
        priority:
          type: integer
          minimum: 1
    ScenarioPackageTransition:
      type: object
      required: [priority, condition]
      additionalProperties: false
      properties:
        toPackageId:
          type: string
          description: Required for package-to-package transition; optional when action is `stop_tracking`.
        condition:
          type: string
          description: Data-driven transition expression evaluated against aggregated state. Transition is considered only when condition matches.
        priority:
          type: integer
          minimum: 1
        action:
          type: string
          enum: [stop_tracking]
          description: Optional terminal action that stops streamer tracking and returns the current state.
        finalStateOptionId:
          type: string
          description: Optional ID of preconfigured final state option to evaluate/apply for this connector.
    ScenarioFinalStateOption:
      type: object
      required: [id, name, condition]
      additionalProperties: false
      properties:
        id:
          type: string
        name:
          type: string
        condition:
          type: string
          description: State condition used to match this option.
        finalStateJson:
          type: string
          description: Optional JSON object patch merged into current state when option is selected.
        finalLabel:
          type: string
          description: Optional label returned when stop action finalizes on this option.
    ScenarioPackageCreateRequest:
      type: object
      required: [gameSlug, name, llmModelConfigId, steps]
      additionalProperties: false
      properties:
        gameSlug:
          type: string
        name:
          type: string
        llmModelConfigId:
          type: string
        steps:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ScenarioStepRequest'
        transitions:
          type: array
          description: Optional explicit graph edges for branching scenario flow. When omitted, backend auto-generates linear transitions by `order`.
          items:
            $ref: '#/components/schemas/ScenarioTransition'
        packageTransitions:
          type: array
          description: Optional package-level graph edges (node = package, edge = transition) or terminal action. Runtime evaluates transitions by priority from shared state on each cycle.
          items:
            $ref: '#/components/schemas/ScenarioPackageTransition'
        finalStateOptions:
          type: array
          description: Optional predefined mini-game final states that admin can choose in package transitions.
          items:
            $ref: '#/components/schemas/ScenarioFinalStateOption'
        finalCondition:
          type: string
          description: Optional logical expression evaluated against the aggregated state before stop-tracking finalization.
    ScenarioStateField:
      type: object
      required: [path]
      additionalProperties: false
      properties:
        path:
          type: string
        type:
          type: string
        possibleValues:
          type: array
          items:
            type: string
    ScenarioPackageVersion:
      allOf:
        - $ref: '#/components/schemas/ScenarioPackageCreateRequest'
        - type: object
          properties:
            id:
              type: string
            version:
              type: integer
            isActive:
              type: boolean
            steps:
              type: array
              items:
                $ref: '#/components/schemas/ScenarioStep'
            transitions:
              type: array
              description: Effective transitions used by runtime (explicit admin-defined edges or backend auto-generated linear edges when omitted in create/update payload).
              items:
                $ref: '#/components/schemas/ScenarioTransition'
            packageTransitions:
              type: array
              description: Effective package-level transitions used by runtime to switch across packages or stop tracking.
              items:
                $ref: '#/components/schemas/ScenarioPackageTransition'
            finalStateOptions:
              type: array
              description: Effective final state options available for package transitions.
              items:
                $ref: '#/components/schemas/ScenarioFinalStateOption'
            finalCondition:
              type: string
              description: Effective mini-game final logical condition configured by admin.
            potentialState:
              type: array
              description: Derived state keys and value variants aggregated from all step response schemas in the package.
              items:
                $ref: '#/components/schemas/ScenarioStateField'
            createdBy:
              type: string
            activatedBy:
              type: string
              nullable: true
            createdAt:
              type: string
              format: date-time
            activatedAt:
              type: string
              format: date-time
              nullable: true
    GameScenarioNode:
      type: object
      required: [id, scenarioPackageId]
      additionalProperties: false
      properties:
        id:
          type: string
        alias:
          type: string
        scenarioPackageId:
          type: string
    GameScenarioTransition:
      type: object
      required: [id, fromNodeId, toNodeId, condition, priority]
      additionalProperties: false
      properties:
        id:
          type: string
          minLength: 1
        fromNodeId:
          type: string
        toNodeId:
          type: string
        condition:
          type: string
        priority:
          type: integer
          minimum: 1
        terminalConditions:
          type: array
          description: Terminal conditions attached to a transition. Runtime first evaluates terminal conditions from the matched transition, then falls back to evaluating terminal conditions from other transitions globally when no matched-transition terminal condition succeeds.
          items:
            $ref: '#/components/schemas/GameScenarioTerminalCondition'
    GameScenarioTerminalCondition:
      type: object
      required: [id, gameTitle, defaultLanguage, outcomeTemplates]
      additionalProperties: false
      properties:
        id:
          type: string
          minLength: 1
        gameTitle:
          type: object
          minProperties: 1
          additionalProperties:
            type: string
        defaultLanguage:
          type: string
          description: Primary locale key used to validate required localized title fields.
        outcomeTemplates:
          type: array
          minItems: 1
          description: Outcome templates with per-button matching conditions. Terminal is considered matched when at least one outcome condition is true.
          items:
            $ref: '#/components/schemas/GameScenarioOutcomeTemplate'
        priority:
          type: integer
          minimum: 1
    GameScenarioOutcomeTemplate:
      type: object
      required: [id, title, condition]
      additionalProperties: false
      properties:
        id:
          type: string
          minLength: 1
        title:
          type: object
          minProperties: 1
          additionalProperties:
            type: string
        condition:
          type: string
          description: Data-driven expression evaluated against aggregated state to determine if this option is the winning outcome.
        priority:
          type: integer
          minimum: 0
          description: Tie-breaker when multiple outcome conditions are true; higher value wins.
    GameScenarioCreateRequest:
      type: object
      required: [name, gameSlug, initialNodeId, nodes]
      additionalProperties: false
      properties:
        name:
          type: string
        gameSlug:
          type: string
        initialNodeId:
          type: string
        nodes:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/GameScenarioNode'
        transitions:
          type: array
          items:
            $ref: '#/components/schemas/GameScenarioTransition'
    GameScenario:
      allOf:
        - $ref: '#/components/schemas/GameScenarioCreateRequest'
        - type: object
          properties:
            id:
              type: string
            version:
              type: integer
            isActive:
              type: boolean
            createdBy:
              type: string
            activatedBy:
              type: string
              nullable: true
            createdAt:
              type: string
              format: date-time
            activatedAt:
              type: string
              format: date-time
              nullable: true
    ScenarioGraphNode:
      type: object
      required: [id, name, gameSlug, folder, initial, order, level]
      properties:
        id:
          type: string
        name:
          type: string
        gameSlug:
          type: string
        folder:
          type: string
        initial:
          type: boolean
        order:
          type: integer
          minimum: 1
        level:
          type: integer
          minimum: 1
    ScenarioGraphEdge:
      type: object
      required: [id, fromStepId, toStepId, condition, priority]
      properties:
        id:
          type: string
        fromStepId:
          type: string
        toStepId:
          type: string
        condition:
          type: string
        priority:
          type: integer
          minimum: 1
    ScenarioGraphGroup:
      type: object
      required: [id, label, gameSlug, folder, nodeIds]
      properties:
        id:
          type: string
        label:
          type: string
        gameSlug:
          type: string
        folder:
          type: string
        nodeIds:
          type: array
          items:
            type: string
    ScenarioPackageGraph:
      type: object
      required: [packageId, packageName, gameSlug, version, nodes, edges, groups]
      properties:
        packageId:
          type: string
        packageName:
          type: string
        gameSlug:
          type: string
        version:
          type: integer
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/ScenarioGraphNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/ScenarioGraphEdge'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/ScenarioGraphGroup'
    LiveEvent:
      type: object
      properties:
        id:
          type: string
        templateId:
          type: string
        scenarioId:
          type: string
        transitionId:
          type: string
        terminalId:
          type: string
        title:
          type: object
          additionalProperties:
            type: string
        defaultLanguage:
          type: string
        options:
          type: array
          items:
